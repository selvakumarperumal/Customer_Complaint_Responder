apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    kubernetes.io/description: "Install external-secrets controller to sync secrets from AWS Secrets Manager"
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: {{ index .Values "external-secrets" "version" }}
    helm:
      parameters:
        - name: installCRDs
          value: "true"
        - name: serviceAccount.create
          value: "false"
        - name: serviceAccount.name
          value: {{ index .Values "external-secrets" "serviceaccountname" }}
        # Pin External Secrets to system nodes — ensures secret sync
        # survives Karpenter-managed node disruptions
        - name: tolerations[0].key
          value: "CriticalAddonsOnly"
        - name: tolerations[0].operator
          value: "Exists"
        - name: nodeSelector.role
          value: "system"
        # Webhook also needs system node placement
        - name: webhook.tolerations[0].key
          value: "CriticalAddonsOnly"
        - name: webhook.tolerations[0].operator
          value: "Exists"
        - name: webhook.nodeSelector.role
          value: "system"
        # Cert controller also needs system node placement
        - name: certController.tolerations[0].key
          value: "CriticalAddonsOnly"
        - name: certController.tolerations[0].operator
          value: "Exists"
        - name: certController.nodeSelector.role
          value: "system"
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ index .Values "external-secrets" "namespace" }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true