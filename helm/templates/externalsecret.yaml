{{- /*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ExternalSecret — "what to fetch" from AWS Secrets Manager
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
This resource tells ESO which secret to pull and where to put it.
It references the SecretStore (secretstore.yaml) for the AWS connection.

End-to-end secret flow:

  terraform apply -var google_api_key=...
       │
       ▼ stores JSON: {"GOOGLE_API_KEY": "AIza..."}
  AWS Secrets Manager  "<clusterName>/google-api-key"
       │
       ▼ ESO authenticates via SecretStore (IRSA)
  ExternalSecret (this resource) polls every {{ .Values.externalSecret.refreshInterval }}
       │
       ▼ ESO creates and owns this
  Kubernetes Secret  "{{ include "ccr.fullname" . }}-api-key"
       │
       ▼ deployment.yaml mounts it as env var
  Pod env  GOOGLE_API_KEY=AIza...

Key points:
  • The Kubernetes Secret is NOT hand-crafted in this chart — ESO creates it.
  • creationPolicy: Owner means ESO deletes the K8s Secret when this
    ExternalSecret is deleted (no orphaned secrets).
  • If you rotate the key in Secrets Manager, ESO will sync the new value
    within {{ .Values.externalSecret.refreshInterval }} without a pod restart.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*/}}
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "ccr.fullname" . }}-api-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ccr.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: SecretStore
  target:
    # ESO creates this K8s Secret; the Deployment reads GOOGLE_API_KEY from it.
    name: {{ include "ccr.fullname" . }}-api-key
    creationPolicy: Owner
  data:
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        # Resolve the Secrets Manager secret name:
        #   - use externalSecret.remoteSecretName if explicitly set, OR
        #   - auto-derive as "<clusterName>/google-api-key" (matches Terraform naming)
        {{- $key := .Values.externalSecret.remoteSecretName }}
        {{- if not $key }}
        {{- $key = printf "%s/google-api-key" (required "clusterName must be set when externalSecret.remoteSecretName is not provided" .Values.clusterName) }}
        {{- end }}
        key: {{ $key }}
        # JSON key inside the secret (Terraform stores it as {"GOOGLE_API_KEY":"..."})
        property: GOOGLE_API_KEY
{{- end }}
