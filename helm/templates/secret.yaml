{{- /*
No hand-crafted Kubernetes Secret is defined here.

The GOOGLE_API_KEY secret is managed entirely by External Secrets Operator:

  secretstore.yaml     — configures the AWS Secrets Manager connection (auth, region)
  externalsecret.yaml  — tells ESO which secret to fetch; ESO creates the K8s Secret

ESO creates a Kubernetes Secret named "{{ include "ccr.fullname" . }}-api-key"
automatically after deploy. The Deployment reads GOOGLE_API_KEY from it via
a secretKeyRef — see deployment.yaml.
*/}}
