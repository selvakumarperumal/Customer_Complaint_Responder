{{- /*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
SecretStore — "how to connect" to AWS Secrets Manager
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
External Secrets Operator (ESO) is split into two CRDs:

  SecretStore   → connection config (this file)
  ExternalSecret → what to fetch     (externalsecret.yaml)

Authentication flow (Pod Identity — replaces IRSA):
  1. Terraform creates aws_eks_pod_identity_association for the ESO controller SA
     (namespace: external-secrets, SA: external-secrets) → the backend IAM role.
  2. The EKS Pod Identity Agent DaemonSet runs on every node.
  3. When the ESO controller pod makes an AWS API call, the Pod Identity Agent
     intercepts it, validates the association, and returns short-lived
     credentials scoped to the IAM role.
  4. No annotation on the ServiceAccount — the binding lives in AWS, not K8s.
  5. ESO calls secretsmanager:GetSecretValue with those credentials.

No `auth` block is needed here — ESO picks up the Pod Identity credentials
from the ambient AWS credential chain (environment / instance metadata).

Prerequisite: ESO must be installed in the cluster:
  helm install eso external-secrets/external-secrets \
    -n external-secrets --create-namespace
  (Terraform has already created the Pod Identity Association for its SA.)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*/}}
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecret.secretStoreName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ccr.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.awsRegion }}
      # No auth block — ESO controller uses Pod Identity credentials injected by
      # the EKS Pod Identity Agent (aws_eks_pod_identity_association in Terraform).
{{- end }}
