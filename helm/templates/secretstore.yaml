{{- /*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
SecretStore — "how to connect" to AWS Secrets Manager
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
External Secrets Operator (ESO) is split into two CRDs:

  SecretStore   → connection config (this file)
  ExternalSecret → what to fetch     (externalsecret.yaml)

This resource tells ESO:
  • USE  AWS Secrets Manager in {{ .Values.awsRegion }}
  • AUTH via the backend ServiceAccount's IRSA token (JWT / OIDC)

Authentication flow:
  1. EKS injects a short-lived OIDC token onto the backend pod via the
     ServiceAccount volume (because the SA has the IRSA annotation
     eks.amazonaws.com/role-arn set during `helm upgrade`).
  2. ESO reads that token and calls AWS STS AssumeRoleWithWebIdentity.
  3. STS returns temporary credentials scoped to the IRSA role.
  4. ESO uses those credentials to call secretsmanager:GetSecretValue.

The SecretStore is reusable — any ExternalSecret in the same namespace
can reference it by name ({{ .Values.externalSecret.secretStoreName }}).

Prerequisite: ESO must be installed in the cluster:
  helm install eso external-secrets/external-secrets \
    -n external-secrets --create-namespace
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*/}}
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecret.secretStoreName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ccr.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.awsRegion }}
      auth:
        jwt:
          # ESO projects a short-lived token for this ServiceAccount and uses
          # its IRSA role (eks.amazonaws.com/role-arn annotation) to call STS.
          serviceAccountRef:
            name: {{ include "ccr.serviceAccountName" . }}
{{- end }}
