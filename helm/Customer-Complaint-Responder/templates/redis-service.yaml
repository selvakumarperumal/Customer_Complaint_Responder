# ---------------------------------------------------------------------------
# Redis Service — ClusterIP on port 6379
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    {{- include "Customer-Complaint-Responder.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "Customer-Complaint-Responder.redis.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
      protocol: TCP
      name: redis
