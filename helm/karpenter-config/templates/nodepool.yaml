apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ include "karpenter-config.fullname" . }}
  labels:
    {{- include "karpenter-config.labels" . | nindent 4 }}
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: {{ include "karpenter-config.fullname" . }}
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values:
            {{- toYaml .Values.nodepool.architectures | nindent 12 }}
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            {{- toYaml .Values.nodepool.capacitytypes | nindent 12 }}
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values:
            {{- toYaml .Values.nodepool.instancecategories | nindent 12 }}
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values:
            - {{ sub (int .Values.nodepool.mininstancegeneration) 1 | quote }}
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            {{- toYaml .Values.nodepool.zones | nindent 12 }}
  limits:
    cpu: {{ .Values.nodepool.limits.cpu | quote }}
    memory: {{ .Values.nodepool.limits.memory | quote }}
  disruption:
    consolidationPolicy: {{ .Values.nodepool.disruption.consolidationPolicy | quote }}
    budgets:
      {{- toYaml .Values.nodepool.disruption.budgets | nindent 6 }}
